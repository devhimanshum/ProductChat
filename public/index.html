<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ChatGPT Chatbot</h1>
        
        <div class="input-section">
            <textarea id="query" placeholder="Ask anything..."></textarea>
            
            <textarea id="systemPrompt" placeholder="Define behavior or rules for the AI (e.g., 'You are a strict teacher')"></textarea>
            
            <select id="model">
                <option value="gpt-5">gpt-5</option>
                <option value="gpt-5-mini">gpt-5-mini</option>
                <option value="gpt-5-nano">gpt-5-nano</option>
                <option value="gpt-4.1">gpt-4.1</option>
                <option value="gpt-4o">gpt-4o</option>
                <option value="gpt-4o-mini">gpt-4o-mini</option>
            </select>
            
            <button id="submitBtn">Send</button>
            
            <div id="loading" class="loading hidden">Loading...</div>
            <div id="error" class="error hidden"></div>
        </div>
        
        <div class="response-section">
            <h2>Response</h2>
            <div class="response-container">
                <h3>Formatted Message</h3>
                <div id="formattedMessage" class="formatted-message"></div>
            </div>
            
            <div class="response-container">
                <h3>Raw JSON Response</h3>
                <pre id="rawResponse" class="raw-response"></pre>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
